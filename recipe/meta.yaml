{% set name = "scanpy" %}
{% set version = "1.12" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8139840bb948ce0aa0798c9b8b88c1df4f06c27641a792f0995d39cd4dcf858a

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - scanpy = scanpy.cli:console_main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - anndata >=0.10.8
    - numpy >=2
    - fast-array-utils
    - matplotlib-base >=3.9
    - pandas >=2.2.2
    - scipy >=1.13
    - seaborn >=0.13.2
    - h5py >=3.11
    - tqdm
    - scikit-learn >=1.4.2
    - statsmodels >=0.14.5
    - patsy
    - networkx >=2.8.8
    - natsort
    - joblib
    - numba >=0.60
    - umap-learn >=0.5.7
    - pynndescent >=0.5.13
    - packaging >=25
    - session-info2
    - legacy-api-wrap >=1.5
    - typing-extensions

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - scanpy
  commands:
    # - pip check  # https://github.com/conda-forge/tbb-feedstock/issues/119
    - python -c 'import importlib.metadata as im; print(im.version("scanpy"))'

about:
  home: https://scverse.org/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Single-Cell Analysis in Python. Scales to >1M cells.
  # The remaining entries in this section are optional, but recommended.
  description: |
    Scanpy is a scalable toolkit for analyzing single-cell gene expression data built jointly with anndata.
    It includes preprocessing, visualization, clustering, trajectory inference and differential expression testing.
    The Python-based implementation efficiently deals with datasets of more than one million cells.
  doc_url: https://scanpy.readthedocs.io/
  dev_url: https://github.com/scverse/scanpy/

extra:
  recipe-maintainers:
    - ilan-gold
    - jdblischak
    - flying-sheep
    - ivirshup
